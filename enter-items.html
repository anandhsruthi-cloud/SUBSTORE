<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0'>
<title>Entries</title>
<link rel='stylesheet' href='css/style.css'>
</head>
<body>

<div class='sidebar'>
<h2>🏥 Inventory</h2>
<a href='dashboard.html'>📊 Dashboard</a>
</div>

<div class='content'>

<div class='page-header'>
<h1>Enter Items</h1>
<p>Add stock into inventory</p>
</div>

<div class='form-box'>
<input id='billNo' placeholder='Bill Number'>
<button class='primary-btn' onclick='addRow()' style='margin-top:20px;'>+ Add Row</button>
</div>

<div class='table-container'>
<table id='entryTable'>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Rate</th>
<th>Remove</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<button class='primary-btn' onclick='saveEntries()' style='margin-top:20px;'>Save Entries</button>

</div>

<script src='js/api.js'></script>
<script src='js/entry.js'></script>

</body>
</html>
